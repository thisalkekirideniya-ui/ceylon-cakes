name: Deploy Ceylon Cakes Flagship

on:
  push:
    branches:
      - main # Triggers the pipeline automatically when you push to main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Compile Production Build
        run: npm run build

      - name: Setup Static Pages Engine
        uses: actions/configure-pages@v4

      - name: Upload Production Assets Bundle
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Execute Live Deployment
        id: deployment
        uses: actions/deploy-pages@v4